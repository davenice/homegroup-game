<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Test the Spirits</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- JOIN SCREEN -->
  <div id="join-screen" class="screen active">
    <div class="card">
      <p class="crown">&#9768;</p>
      <h1>Test the Spirits</h1>
      <p class="scripture">1 John 4:1</p>

      <div id="join-form">
        <p class="subtitle">Enter your name to join</p>
        <input type="text" id="player-name" placeholder="Your name" maxlength="20" autocomplete="off">
        <label class="host-label">
          <input type="checkbox" id="is-host"> I am the host
        </label>
        <button id="join-btn" class="btn btn-primary">Enter</button>
        <p id="join-error" class="error hidden"></p>
      </div>

      <div id="letmein-panel" class="hidden">
        <p class="subtitle">What would you like to do?</p>
        <button id="reset-game-btn" class="btn btn-secondary">Reset Game</button>
        <button id="takeover-host-btn" class="btn btn-secondary">Take Over as Host</button>
        <button id="letmein-back-btn" class="btn btn-ghost">Cancel</button>
      </div>
    </div>
  </div>

  <!-- WAITING SCREEN -->
  <div id="waiting-screen" class="screen">
    <div class="card">
      <p class="crown">&#9768;</p>
      <h2>Waiting for the host…</h2>
      <div id="player-list-container">
        <p class="label">Those who have gathered:</p>
        <ul id="player-list"></ul>
      </div>
      <button id="start-btn" class="btn btn-primary admin-only hidden">Begin</button>
    </div>
  </div>

  <!-- GAME SCREEN -->
  <div id="game-screen" class="screen">
    <div class="game-layout">
      <p id="question-number" class="question-number"></p>

      <p class="prompt">Someone says…</p>
      <blockquote id="question-text" class="question-text"></blockquote>

      <p class="hint" id="drag-hint">Tap to answer — you can change your mind</p>

      <div id="answer-zones"></div>

      <div class="admin-panel admin-only hidden">
        <p id="answer-count" class="answer-count"></p>
        <button id="show-results-btn" class="btn btn-secondary">Reveal Results</button>
      </div>
    </div>
  </div>

  <!-- RESULTS SCREEN -->
  <div id="results-screen" class="screen">
    <div class="card">
      <h2 id="results-question-text"></h2>
      <div id="results-bars"></div>
      <div class="admin-panel admin-only hidden">
        <button id="next-question-btn" class="btn btn-primary">Next</button>
      </div>
    </div>
  </div>

  <!-- DONE SCREEN -->
  <div id="done-screen" class="screen">
    <div class="card">
      <p class="crown">&#9768;</p>
      <h1>The spirits have been tested.</h1>
      <p class="scripture">Well done, good and faithful servant.</p>
    </div>
  </div>

  <script type="module" src="app.js"></script>
</body>
</html>
