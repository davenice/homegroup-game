<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quiz Game</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- JOIN SCREEN -->
  <div id="join-screen" class="screen active">
    <div class="card">
      <h1>Quiz Game</h1>
      <p class="subtitle">Enter your name to join</p>
      <input type="text" id="player-name" placeholder="Your name" maxlength="20" autocomplete="off">
      <label class="host-label">
        <input type="checkbox" id="is-host"> I am the host
      </label>
      <button id="join-btn" class="btn btn-primary">Join Game</button>
      <p id="join-error" class="error hidden"></p>
    </div>
  </div>

  <!-- WAITING SCREEN -->
  <div id="waiting-screen" class="screen">
    <div class="card">
      <h2>Waiting for the game to start…</h2>
      <div id="player-list-container">
        <p class="label">Players joined:</p>
        <ul id="player-list"></ul>
      </div>
      <button id="start-btn" class="btn btn-primary admin-only hidden">Start Game</button>
    </div>
  </div>

  <!-- GAME SCREEN -->
  <div id="game-screen" class="screen">
    <div class="game-layout">
      <p id="question-number" class="question-number"></p>

      <div id="question-card-area">
        <div id="question-card" draggable="true">
          <span id="question-text"></span>
        </div>
      </div>

      <p class="drag-hint" id="drag-hint">Drag the question onto the correct answer, or just click an answer</p>

      <div id="answer-zones"></div>

      <div class="admin-panel admin-only hidden">
        <button id="show-results-btn" class="btn btn-secondary">Show Results</button>
      </div>
    </div>
  </div>

  <!-- RESULTS SCREEN -->
  <div id="results-screen" class="screen">
    <div class="card">
      <h2 id="results-question-text"></h2>
      <div id="results-bars"></div>
      <div class="admin-panel admin-only hidden">
        <button id="next-question-btn" class="btn btn-primary">Next Question</button>
      </div>
    </div>
  </div>

  <!-- DONE SCREEN -->
  <div id="done-screen" class="screen">
    <div class="card">
      <h1>Game Over!</h1>
      <p class="subtitle">Thanks for playing.</p>
    </div>
  </div>

  <script type="module" src="app.js"></script>
</body>
</html>
